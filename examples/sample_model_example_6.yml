sample:
    model:
        comment: Saw tooth sample model
        stack: air | gtop 50 | 5 (rgradient 50 | gradient 50) | Si
        sub_stacks:
          gradient:
            sub_stack_class: FunctionTwoElements
            material1: Ni
            material2: Ti
            function: x
          rgradient:
            like: gradient
            but:
              function: 1-x
          gtop:
            like: gradient
            but:
              roughness: 15.0
        globals:
            slice_resolution: {magnitude: 10.0, unit: nm}

        # below is just used for orsopy testing and not part of this model
        test:
          stacks: 4
          blocks: 13
          layers: 57
